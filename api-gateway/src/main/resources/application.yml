  SecretKey: aas7a6f6df7s6s6f756gs8d5g6s5f6s5f54r46rwrfbj4btfuhdg7hd87hdfff6g7df465fbtdfghv7rt8236749

server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/api/v1/orders/**
              filters:
                - StripPrefix=2
                - name: LoggingOrdersFilter
                - name: Authentication
                  args:
                    isEnabled: false
                - name: Authorization
                  args:
                    allowedRoles: ADMIN, SUPER_ADMIN
            - id: inventory-service
              uri: lb://INVENTORY-SERVICE
              predicates:
                - Path=/api/v1/inventory/**
              filters:
                - StripPrefix=2
                - AddRequestHeader=X-Custom-Header, Smit
                - name: Authentication

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.cloud.loadbalancer: DEBUG
    reactor.netty.http.client: DEBUG