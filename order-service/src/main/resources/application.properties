spring.application.name=order-service
spring.config.import=configserver:http://localhost:8888

# Actuator security - restrict sensitive endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.env.enabled=false
management.endpoint.configprops.enabled=false
management.endpoint.beans.enabled=false

# Kafka / Spring Cloud Stream
spring.cloud.stream.bindings.orderCreatedEvent-out-0.destination=order.created
spring.cloud.stream.bindings.orderCreatedEvent-out-0.content-type=application/json
spring.cloud.stream.kafka.binder.brokers=localhost:9092

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.configs.inventoryCircuitBreaker.sliding-window-size=6
resilience4j.circuitbreaker.configs.inventoryCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.inventoryCircuitBreaker.wait-duration-in-open-state=10000ms
