
spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/smitroy4/circuitmart-config-server
          username: "${GITHUB_USERNAME:smitroy4}"
          password: "${GITHUB_ACCESS_TOKEN}"
          default-label: main

server:
  port: 8888
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

